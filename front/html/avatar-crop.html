<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>网易云原型 - 裁剪头像</title>
  <link rel="stylesheet" href="./assets/app.css" />
</head>
<body data-page="avatar-crop">
  <div class="app no-tab" style="background:#0b0b0e;">
    <header class="topbar">
      <div class="topbar-inner">
        <button class="icon-btn" data-action="crop-cancel" aria-label="取消">
          <svg class="icon" viewBox="0 0 24 24"><path d="M18.3 5.7L12 12l6.3 6.3l-1.4 1.4L10.6 13.4L4.3 19.7L2.9 18.3L9.2 12L2.9 5.7L4.3 4.3l6.3 6.3l6.3-6.3l1.4 1.4z"/></svg>
        </button>
        <div class="title" style="color:#fff;">裁剪头像</div>
        <div class="spacer"></div>
        <button class="icon-btn" data-action="crop-save" aria-label="保存">
          <svg class="icon" viewBox="0 0 24 24"><path d="M9 16.2l-3.5-3.5L4 14.2l5 5l12-12L19.5 5.7z"/></svg>
        </button>
      </div>
    </header>

    <main class="content" style="padding:12px 12px 16px;">
      <section class="section" style="margin-top:6px;">
        <div style="border-radius:18px; overflow:hidden; border:1px solid rgba(255,255,255,.10); background:#0b0b0e;">
          <canvas data-el="crop-canvas" style="width:100%; height:62vh; display:block;"></canvas>
        </div>
        <div class="muted" style="margin-top:10px; color:rgba(255,255,255,.75); font-size:12px;">
          拖动圆形框选择区域；用下方滑块调整缩放与框大小。
        </div>
      </section>

      <section class="section" style="margin-top:12px;">
        <div class="form" style="background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.10);">
          <div class="field" style="border-top-color:rgba(255,255,255,.10);">
            <label style="color:rgba(255,255,255,.70);">缩放</label>
            <input type="range" min="1" max="3" step="0.01" value="1" data-el="crop-zoom" style="width:100%;" />
          </div>
          <div class="field" style="border-top-color:rgba(255,255,255,.10);">
            <label style="color:rgba(255,255,255,.70);">圆框大小</label>
            <input type="range" min="0.22" max="0.46" step="0.005" value="0.36" data-el="crop-size" style="width:100%;" />
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./assets/app.js"></script>
</body>
</html>
