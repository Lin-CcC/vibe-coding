<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>网易云原型 - 我喜欢的音乐</title>
  <link rel="stylesheet" href="./assets/app.css" />
</head>
<body data-page="liked">
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <button class="icon-btn" onclick="history.length>1?history.back():location.href='./index.html'" aria-label="返回">
          <svg class="icon" viewBox="0 0 24 24"><path d="M15.5 5l-7 7l7 7l-1.4 1.4L5.7 12l8.4-8.4L15.5 5z"/></svg>
        </button>
        <div class="title">我喜欢的音乐</div>
        <div class="spacer"></div>
        <div style="width:42px;"></div>
      </div>
    </header>

    <main class="content">
      <section class="section">
        <div class="muted" style="margin-bottom:10px;">在播放页点“♡ 喜欢 / ♥ 已喜欢”即可添加或取消。</div>
        <div class="list" data-el="liked-list"></div>
      </section>

      <section class="section">
        <div class="section-title">
          <h3>收藏的歌单</h3>
          <div class="more">来自歌单详情页</div>
        </div>
        <div data-el="liked-playlists"></div>
      </section>
    </main>
  </div>

  <div data-mount="miniplayer"></div>
  <div data-mount="tabbar"></div>
  <script src="./assets/app.js"></script>
</body>
</html>
