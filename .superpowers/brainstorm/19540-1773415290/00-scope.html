<h2>先做哪些页面/流程？</h2>
<p class="subtitle">先定一期范围（可随时迭代加页）</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>核心试听</h3>
      <p>发现（首页）+ 播放页（含歌词/进度）</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>常用主路径</h3>
      <p>发现 + 搜索 + 播放页 + 歌单详情</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>更完整原型</h3>
      <p>在 B 基础上再加：我的/登录/设置</p>
    </div>
  </div>
</div>

<div class="section">
  <p class="subtitle">你也可以先点一个范围，再在聊天里补充“必须包含的页面”。</p>
</div>
